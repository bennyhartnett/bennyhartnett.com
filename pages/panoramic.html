<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />

<style>
  .panoramic-page {
    min-height: calc(100vh - 56px - 2rem);
    min-height: calc(100svh - 56px - 2rem);
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: min(100%, 1100px);
    margin: 0 auto;
    padding: 1.25rem 1rem 1rem;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
  }

  .panoramic-header h1 {
    margin: 0;
    font-size: clamp(1.4rem, 2.5vw, 2rem);
  }

  .panoramic-header p {
    margin: 0.4rem 0 0;
    color: rgba(255, 255, 255, 0.75);
  }

  .panoramic-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
    padding: 0.85rem;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .panoramic-url {
    flex: 1 1 420px;
    min-width: 240px;
    height: 2.5rem;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(0, 0, 0, 0.35);
    color: #ffffff;
    padding: 0 0.75rem;
    font-size: 0.92rem;
  }

  .panoramic-url::placeholder {
    color: rgba(255, 255, 255, 0.5);
  }

  .panoramic-btn {
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.12);
    color: #ffffff;
    font-size: 0.9rem;
    padding: 0.58rem 0.9rem;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .panoramic-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-1px);
  }

  .panoramic-upload-wrap {
    position: relative;
    overflow: hidden;
  }

  .panoramic-upload {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .panoramic-toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.95);
    user-select: none;
  }

  .panoramic-toggle input {
    width: 1rem;
    height: 1rem;
    accent-color: #6fb1ff;
  }

  .panoramic-status {
    margin: 0;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.75);
    min-height: 1.25rem;
  }

  .panoramic-viewer {
    width: 100%;
    height: min(68vh, 680px);
    min-height: 400px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
  }

  @media (max-width: 720px) {
    .panoramic-controls {
      padding: 0.75rem;
    }

    .panoramic-viewer {
      min-height: 320px;
      height: 54vh;
    }
  }
</style>

<div class="panoramic-page">
  <header class="panoramic-header">
    <h1>Panoramic Viewer</h1>
    <p>Look around a 360° panoramic photo like Street View. Paste an equirectangular image URL or upload a panoramic photo from your device.</p>
  </header>

  <div class="panoramic-controls">
    <input
      id="panoramic-url"
      class="panoramic-url"
      type="url"
      value="https://pannellum.org/images/alma.jpg"
      placeholder="https://example.com/panorama.jpg"
      aria-label="Panoramic image URL"
    />
    <label class="panoramic-upload-wrap panoramic-btn" for="panoramic-upload">
      <input id="panoramic-upload" class="panoramic-upload" type="file" accept="image/*" aria-label="Upload panoramic image" />
      Upload photo
    </label>
    <button id="panoramic-load" class="panoramic-btn" type="button">Load URL</button>
    <button id="panoramic-reset" class="panoramic-btn" type="button">Reset view</button>
    <label class="panoramic-toggle" for="panoramic-loop">
      <input id="panoramic-loop" type="checkbox" checked />
      360 loop
    </label>
  </div>

  <p id="panoramic-status" class="panoramic-status">Ready.</p>

  <div id="panoramic-viewer" class="panoramic-viewer" aria-label="Panoramic viewer"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<script>
  (() => {
    const scope = document.currentScript.closest('.panoramic-page');
    if (!scope || !window.pannellum) {
      return;
    }

    const viewerNode = scope.querySelector('#panoramic-viewer');
    const urlInput = scope.querySelector('#panoramic-url');
    const loadButton = scope.querySelector('#panoramic-load');
    const uploadInput = scope.querySelector('#panoramic-upload');
    const resetButton = scope.querySelector('#panoramic-reset');
    const loopToggle = scope.querySelector('#panoramic-loop');
    const statusNode = scope.querySelector('#panoramic-status');

    let viewer;
    let objectUrl;

    function setStatus(message, isError = false) {
      statusNode.textContent = message;
      statusNode.style.color = isError ? 'rgba(255, 110, 110, 0.95)' : 'rgba(255, 255, 255, 0.75)';
    }

    function applyLoopSetting() {
      if (!viewer) return;
      if (loopToggle.checked) {
        viewer.startAutoRotate(-2);
      } else {
        viewer.stopAutoRotate();
      }
    }

    function revokeObjectUrl() {
      if (!objectUrl) {
        return;
      }
      URL.revokeObjectURL(objectUrl);
      objectUrl = null;
    }

    function createViewer(url, sourceLabel = 'URL') {
      if (!url) {
        setStatus('Enter a panoramic image URL or upload a photo first.', true);
        return;
      }

      viewerNode.innerHTML = '';
      viewer = pannellum.viewer(viewerNode, {
        type: 'equirectangular',
        panorama: url,
        autoLoad: true,
        showZoomCtrl: true,
        showFullscreenCtrl: true,
        mouseZoom: true,
        compass: false
      });

      viewer.on('load', () => {
        setStatus(`Panorama loaded from ${sourceLabel}. Drag to look around.`);
        applyLoopSetting();
      });

      viewer.on('error', (error) => {
        const message = error && error.message ? error.message : `Unable to load panoramic image from ${sourceLabel}.`;
        setStatus(message, true);
      });
    }

    loadButton.addEventListener('click', () => {
      revokeObjectUrl();
      createViewer(urlInput.value.trim(), 'URL');
    });

    urlInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        revokeObjectUrl();
        createViewer(urlInput.value.trim(), 'URL');
      }
    });

    uploadInput.addEventListener('change', () => {
      const file = uploadInput.files && uploadInput.files[0];
      if (!file) {
        return;
      }
      revokeObjectUrl();
      objectUrl = URL.createObjectURL(file);
      createViewer(objectUrl, `upload (${file.name})`);
    });

    resetButton.addEventListener('click', () => {
      if (!viewer) return;
      viewer.setPitch(0);
      viewer.setYaw(0);
      viewer.setHfov(100);
      applyLoopSetting();
      setStatus('View reset.');
    });

    loopToggle.addEventListener('change', () => {
      applyLoopSetting();
      setStatus(loopToggle.checked ? '360 loop enabled.' : '360 loop disabled.');
    });

    createViewer(urlInput.value.trim(), 'URL');
    window.addEventListener('beforeunload', revokeObjectUrl);
  })();
</script>
